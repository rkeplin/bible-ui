# React UI - the API URLs are BAKED IN at build time (.env.production).
# A dedicated k8s image must be built with the k8s-* domains:
#   see bin/push.sh (builds rkeplin/bible-react-ui:k8s-<sha>)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bible-ui
  namespace: bible
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bible-ui
  template:
    metadata:
      labels:
        app: bible-ui
    spec:
      containers:
        - name: ui
          image: rkeplin/bible-react-ui:k8s
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: bible-ui
  namespace: bible
spec:
  selector:
    app: bible-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
