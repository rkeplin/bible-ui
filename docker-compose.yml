version: '3'
services:
  bible-ui:
    build: .
    stdin_open: true
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8084/v1}
      - REACT_APP_USER_API_URL=${REACT_APP_USER_API_URL:-http://localhost:8083/v1}
    networks:
      - net1

networks:
  net1:
